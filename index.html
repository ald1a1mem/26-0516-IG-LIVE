  { time: 441, text: "SANGYEON | I LOVE YOU\nXINLONG | 謝謝" },
  { time: 442, text: "SANGYEON | 我愛你\nXINLONG | 辛苦了" },
  { time: 443, text: "XINLONG | 辛苦了\nSANGWON | 結束！" },
];

// 3. 載入 YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId,
    playerVars: {
      'autoplay': 0,
      'controls': 1,
      'rel': 0,
      'modestbranding': 1,
      'cc_load_policy': 0, // 預設關閉 YouTube 內建字幕
      'fs': 0,              // 移除 YouTube 原生的全螢幕按鈕
      'origin': window.location.origin
    },
    events: {
      'onReady': onPlayerReady,
      'onError': onPlayerError
    }
  });
}

function onPlayerReady(event) {
  setInterval(updateSubtitle, 200);
}

function onPlayerError(e) {
  console.error("播放器出錯，代碼：" + e.data);
}

// 4. 字幕更新邏輯
function updateSubtitle(){
  if(!player || !player.getCurrentTime || typeof player.getCurrentTime !== 'function') return;

  const t = player.getCurrentTime();
  let text = "";

  for(let i = subtitles.length - 1; i >= 0; i--){
    const sub = subtitles[i];
    if(t >= sub.time){
      if(sub.endTime && t >= sub.endTime) {
        text = ""; 
      } else {
        text = sub.text;
      }
      break; 
    }
  }

  const subEl = document.getElementById("subtitle");
  if(text === "") {
    subEl.style.display = "none";
  } else {
    subEl.style.display = "block";
    subEl.innerText = text;
  }
}

// 5. 控制功能
let currentFontSize = 18;
function changeFontSize(delta) {
  currentFontSize += delta;
  document.getElementById("subtitle").style.fontSize = currentFontSize + "px";
}
function resetFontSize() {
  currentFontSize = 18;
  document.getElementById("subtitle").style.fontSize = "18px";
}

function enterFullScreen() {
  const elem = document.getElementById("video-container");
  if (elem.requestFullscreen) { elem.requestFullscreen(); }
  else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
  else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
}

function exitFullScreen() {
  if (document.exitFullscreen) { document.exitFullscreen(); }
  else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
  else if (document.msExitFullscreen) { document.msExitFullscreen(); }
}

document.addEventListener('fullscreenchange', () => {
  const subEl = document.getElementById("subtitle");
  if (document.fullscreenElement) {
    subEl.style.fontSize = (currentFontSize * 1.5) + "px";
  } else {
    subEl.style.fontSize = currentFontSize + "px";
  }
});
</script>
